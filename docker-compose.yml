version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # ChromaDB (indexada previamente en el host)
      - ./scripts_index/chroma_db:/app/scripts_index/chroma_db:ro
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # ChromaDB (el generador de proyectos también la consulta directamente)
      - ./scripts_index/chroma_db:/app/scripts_index/chroma_db:ro
      # Documentos Word generados (persistidos en el host)
      - ./outputs:/app/outputs
    depends_on:
      - backend
    restart: unless-stopped
